<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Login</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#0f172a,#1e3a8a);

    font-family:Arial,sans-serif;
}

/* LOGIN BOX */

.login-box{

    width:340px;

    background:white;

    padding:25px;

    border-radius:12px;

    box-shadow:0px 4px 15px rgba(0,0,0,0.25);
}

/* TITLE */

.logo{

    text-align:center;

    margin-bottom:18px;
}

.logo i{

    font-size:42px;

    color:#2563eb;
}

.logo h2{

    margin-top:6px;

    font-size:28px;

    color:#111827;

    font-weight:600;
}

/* INPUT */

.input-group{

    margin-bottom:14px;
}

.input-group-text{

    background:#f1f5f9;

    border:none;

    color:#2563eb;
}

.form-control{

    height:42px;

    border:none;

    background:#f1f5f9;

    font-size:14px;
}

.form-control:focus{

    box-shadow:none;

    background:#e2e8f0;
}

/* BUTTONS */

.login-btn,
.register-btn,
.home-btn{

    width:100%;

    height:42px;

    border:none;

    border-radius:8px;

    color:white;

    font-size:16px;

    font-weight:600;

    display:flex;

    justify-content:center;

    align-items:center;

    text-decoration:none;

    transition:0.3s;
}

.login-btn{

    background:#2563eb;
}

.login-btn:hover{

    background:#1d4ed8;
}

.register-btn{

    background:#059669;
}

.register-btn:hover{

    background:#047857;
}

.home-btn{

    background:#0f172a;
}

.home-btn:hover{

    background:#1e293b;
}

/* TEXT */

.info{

    text-align:center;

    margin:14px 0;

    font-size:13px;

    color:#64748b;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="logo">

        <i class="bi bi-mortarboard-fill"></i>

        <h2>Student Login</h2>

    </div>

    <form action="StudentLoginServlet"
    method="post">

        <div class="input-group">

            <span class="input-group-text">

                <i class="bi bi-person-fill"></i>

            </span>

            <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required>

        </div>

        <div class="input-group">

            <span class="input-group-text">

                <i class="bi bi-lock-fill"></i>

            </span>

            <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter Password"
            required>

        </div>

        <button class="login-btn">

            Login

        </button>

    </form>

    <div class="info">

        Don't have an account? Register first

    </div>

    <a href="Register.html"
    class="register-btn">

        Register

    </a>

    <br>

    <a href="Landing_page.html"
    class="home-btn">

        Back To Home Page

    </a>

</div>

</body>

</html>
