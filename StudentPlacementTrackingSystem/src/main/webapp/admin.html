<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Admin Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eef2f7;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* SIDEBAR */

.sidebar{
    width:240px;
    height:100vh;
    background:linear-gradient(to bottom,#0f172a,#1e293b);
    position:fixed;
    left:0;
    top:0;
    padding:18px;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
    margin-bottom:28px;
}

.logo span{
    color:#60a5fa;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:#e2e8f0;
    padding:12px 14px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.sidebar a:hover{
    background:#2563eb;
    color:white;
}

.logout{
    background:#dc2626;
    color:white !important;
    margin-top:25px;
}

.logout:hover{
    background:#b91c1c !important;
}

/* MAIN */

.main-content{
    margin-left:220px;
    padding:14px;
    height:100vh;
}

/* TOPBAR */

.topbar{
    background:white;
    border-radius:18px;
    padding:14px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

.topbar h1{
    font-size:28px;
    font-weight:400;
    margin:0;
}

.admin-box{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:16px;
    font-weight:bold;
}

.admin-box img{
    width:42px;
    height:42px;
}

/* FRAME */

.frame-box{
    height:calc(100vh - 100px);
    background:#dde3ea;
    border-radius:20px;
    padding:12px;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:16px;
    background:white;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        Admin <span>Portal</span>
    </div>

    <a href="AdminDashboardServlet" target="contentFrame">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="addcompany.html" target="contentFrame">
        <i class="bi bi-building-add"></i>
        Add Company
    </a>

    <a href="ViewCompaniesServlet" target="contentFrame">
        <i class="bi bi-buildings-fill"></i>
        View Companies
    </a>

    <a href="AdminViewStudentsServlet" target="contentFrame">
        <i class="bi bi-people-fill"></i>
        View Students
    </a>

    <a href="PlacementApplicationsServlet" target="contentFrame">
        <i class="bi bi-file-earmark-check-fill"></i>
        Placement Applications
    </a>
    <a href="logout" class="logout">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<!-- MAIN -->

<div class="main-content">

    <!-- TOPBAR -->

    <div class="topbar">

        <h1>
            Welcome To Admin Dashboard
        </h1>

        <div class="admin-box">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

            Welcome Admin

        </div>

    </div>

    <!-- CONTENT -->

    <div class="frame-box">

        <iframe
        name="contentFrame"
        src="AdminDashboardServlet">
        </iframe>

    </div>

</div>

</body>
</html>
