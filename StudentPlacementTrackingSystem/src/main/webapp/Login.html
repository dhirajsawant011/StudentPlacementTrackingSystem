<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#0f172a,#1e3a8a);

    font-family:Arial,sans-serif;
}

/* LOGIN BOX */

.login-box{

    width:400px;

    background:white;

    padding:35px;

    border-radius:18px;

    box-shadow:0px 8px 25px rgba(0,0,0,0.25);
}

/* LOGO */

.logo{

    text-align:center;

    margin-bottom:25px;
}

.logo i{

    font-size:55px;

    color:#2563eb;
}

.logo h2{

    margin-top:10px;

    font-size:36px;

    color:#111827;

    font-weight:600;
}

/* INPUT */

.input-group{

    margin-bottom:20px;
}

.input-group-text{

    background:#eff6ff;

    border:none;

    color:#2563eb;

    font-size:18px;
}

.form-control{

    height:50px;

    border:none;

    background:#f1f5f9;

    font-size:16px;
}

.form-control:focus{

    box-shadow:none;

    background:#e2e8f0;
}

/* BUTTON */

.login-btn{

    width:100%;

    height:50px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:20px;

    font-weight:600;

    transition:0.3s;
}

.login-btn:hover{

    background:#1d4ed8;
}

/* FOOTER */

.footer-text{

    text-align:center;

    margin-top:18px;

    color:#64748b;

    font-size:14px;
}
/* HOME BUTTON */

.home-btn{

    display:block;

    width:100%;

    text-align:center;

    margin-top:15px;

    padding:12px;

    background:#64748b;

    color:white;

    text-decoration:none;

    border-radius:10px;

    font-size:18px;

    font-weight:600;

    transition:0.3s;
}

.home-btn:hover{

    background:#475569;

    color:white;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="logo">

        <i class="bi bi-person-circle"></i>

        <h2>Admin Login</h2>

    </div>

    <form action="AdminLoginServlet"
    method="post">

        <div class="input-group">

            <span class="input-group-text">

                <i class="bi bi-person-fill"></i>

            </span>

            <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required>

        </div>

        <div class="input-group">

            <span class="input-group-text">

                <i class="bi bi-lock-fill"></i>

            </span>

            <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter Password"
            required>

        </div>

        <button class="login-btn">

            Login

        </button>
        

    </form>
    
   
 <a href="Landing_page.html"
    class="home-btn">

        Back To Home Page

    </a>
    <div class="footer-text">

        Placement Tracking System

    </div>
	
</div>

</body>
</html>
