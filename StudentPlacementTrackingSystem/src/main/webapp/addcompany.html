<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Company</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eef2f7;
    font-family:Arial,sans-serif;
}

/* CENTER FORM */

.main-container{

    width:100%;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* FORM BOX */

.form-box{

    width:380px;

    background:white;

    padding:25px;

    border-radius:10px;

    box-shadow:0px 3px 10px rgba(0,0,0,0.10);
}

/* TITLE */

.form-title{

    text-align:center;

    font-size:28px;

    margin-bottom:18px;

    color:#111827;

    font-weight:600;
}

/* INPUT */

.form-control{

    height:40px;

    margin-bottom:14px;

    border-radius:8px;

    font-size:14px;

    padding-left:12px;
}

/* BUTTON */

.btn-company{

    width:100%;

    height:42px;

    border:none;

    border-radius:8px;

    background:#2563eb;

    color:white;

    font-size:16px;

    font-weight:600;

    transition:0.3s;
}

.btn-company:hover{

    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="main-container">

    <div class="form-box">

        <h2 class="form-title">
            Add Company
        </h2>

        <form action="AddCompanyServlet" method="post">

            <input
            type="hidden"
            name="cid"
            value="">

            <input
            type="text"
            name="companyName"
            class="form-control"
            placeholder="Enter Company Name">

            <input
            type="text"
            name="packageName"
            class="form-control"
            placeholder="Enter Package">

            <input
            type="text"
            name="location"
            class="form-control"
            placeholder="Enter Location">

            <input
            type="text"
            name="criteria"
            class="form-control"
            placeholder="Enter Criteria">

            <input
            type="submit"
            value="Add Company"
            class="btn-company">

        </form>

    </div>

</div>

</body>
</html>
