<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    padding:30px;
}

.main-container{
    width:100%;
    max-width:1200px;
}

.register-card{
    width:100%;
    min-height:100vh;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

.left-side{
    background:linear-gradient(135deg,#0f172a,#2563eb);
    color:white;
    padding:60px 40px;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
}


.left-side h1{
    font-weight:bold;
    margin-bottom:20px;
}

.left-side p{
    font-size:18px;
    line-height:30px;
}

.right-side{
    padding:40px;
}

.form-title{
    text-align:center;
    margin-bottom:30px;
    font-weight:bold;
    color:#0f172a;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.input-group-text{
    border-radius:10px 0px 0px 10px;
}

.btn-register{
    width:100%;
    height:50px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container-fluid main-container">

    <div class="row register-card">

        <!-- Left Side -->

        <div class="col-lg-5 left-side">

            <h1>Placement Tracking System</h1>

            <p>
                Register yourself and explore placement opportunities,
                company drives, job applications, and placement status
                updates in one platform.
            </p>

        </div>

        <!-- Right Side -->

        <div class="col-lg-7 right-side">

            <h2 class="form-title">
                Student Registration
            </h2>

            <!-- Registration Form -->

            <form action="StudentRegisterServlet" method="post">

                <!-- Row 1 -->

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Full Name</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Enter full name"
                                   required>

                        </div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-envelope-fill"></i>
                            </span>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Enter email"
                                   required>

                        </div>

                    </div>

                </div>

                <!-- Row 2 -->

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Mobile</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-telephone-fill"></i>
                            </span>

                            <input type="text"
                                   name="mobile"
                                   class="form-control"
                                   placeholder="Enter mobile"
                                   required>

                        </div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Course</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-book-fill"></i>
                            </span>

                            <input type="text"
                                   name="course"
                                   class="form-control"
                                   placeholder="Enter course"
                                   required>

                        </div>

                    </div>

                </div>

                <!-- Row 3 -->

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Percentage</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-bar-chart-fill"></i>
                            </span>

                            <input type="number"
                                   step="0.01"
                                   name="percentage"
                                   class="form-control"
                                   placeholder="Enter percentage"
                                   required>

                        </div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Skills</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-tools"></i>
                            </span>

                            <input type="text"
                                   name="skills"
                                   class="form-control"
                                   placeholder="Java, SQL"
                                   required>

                        </div>

                    </div>

                </div>

                <!-- Password -->

                <div class="mb-4">

                    <label class="form-label">Password</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter password"
                               required>

                    </div>

                </div>

                <!-- Button -->

                <button type="submit"
                        class="btn btn-primary btn-register">

                    <i class="bi bi-person-plus-fill"></i>
                    Register

                </button>

            </form>

            <!-- Login Link -->

            <div class="login-link">

                Already have an account?

                <a href="Login.html">
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
