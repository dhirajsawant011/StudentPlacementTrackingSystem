<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->
	
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Font -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#edf2f7;
    overflow:hidden;
}

/* Sidebar */

.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    padding:25px 18px;
    color:white;
    box-shadow:5px 0px 20px rgba(0,0,0,0.15);
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h2{
    font-size:30px;
    font-weight:700;
    line-height:50px;
}

.logo span{
    color:#60a5fa;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:14px;
    color:#e2e8f0;
    text-decoration:none;
    padding:14px 16px;
    border-radius:12px;
    margin-bottom:12px;
    font-size:16px;
    transition:0.3s;
    font-weight:800;
}

.sidebar a i{
    font-size:14px;
}

.sidebar a:hover{
    background:#2563eb;
    transform:translateX(5px);
    color:white;
}

.logout{
    margin-top:30px;
    background:linear-gradient(135deg,#dc2626,#b91c1c);
    color:white;
    font-weight:600;
    border-radius:12px;
}

.logout:hover{
    background:#b91c1c !important;
}

/* Main Area */

.main-content{
    margin-left:250px;
    height:30px;
    padding:18px;
}

/* Top Navbar */

.topbar{
    background:white;
    padding:18px 28px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0px 5px 20px rgba(0,0,0,0.08);
    margin-bottom:18px;
}

.topbar h3{
    margin:0;
    font-weight:70;
    color:#0f172a;
}

.profile-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.profile-box img{
    width:30px;
    height:30px;
    border-radius:50%;
    border:3px solid #2563eb;
}

.profile-box span{
    font-weight:600;
    color:#1e293b;
}

/* iframe area */

.frame-container{
    height:calc(100vh - 110px);
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0px 5px 20px rgba(0,0,0,0.08);
}

.content-frame{
    width:100%;
    height:100%;
    border:none;
}

/* Scrollbar */

::-webkit-scrollbar{
    width:5px;
}

::-webkit-scrollbar-thumb{
    background:#94a3b8;
    border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">

        <h2>
            Student <span>Portal</span>
        </h2>

    </div>

    <!-- Dashboard -->

    <a href="studentdashboard"
       target="contentFrame">

        <i class="bi bi-speedometer2"></i>

        Dashboard

    </a>
    
      <!-- Profile -->

    <a href="StudentProfileServlet"
       target="contentFrame">

        <i class="bi bi-person-circle"></i>

        My Profile

    </a>
    
    
    <!-- Update Profile -->

    <a href="UpdateStudentProfileServlet"
   target="contentFrame">

        <i class="bi bi-person-circle"></i>

        Update Profile

    </a>

    <!-- View Companies -->

    <a href="StudentViewCompaniesServlet"
       target="contentFrame">

        <i class="bi bi-buildings-fill"></i>

        View Companies

    </a>

    <!-- Applied Companies -->

    
    <!-- Placement Status -->

    <a href="AppliedCompaniesServlet"
       target="contentFrame">

        <i class="bi bi-patch-check-fill"></i>

        Placement Status

    </a>

 

    <!-- Logout -->

    <a href="studentlogout"
       class="logout">

        <i class="bi bi-box-arrow-right"></i>

        Logout

    </a>

</div>

<!-- Main Content -->

<div class="main-content">

    <!-- Topbar -->

    <div class="topbar">

        <h3>
            Welcome To Student Dashboard
        </h3>

        <div class="profile-box">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

            <span id="studentName"></span>
        </div>

    </div>

    <!-- iframe -->

    <div class="frame-container">

        <iframe
            name="contentFrame"
            class="content-frame"
            src="studentdashboard">
        </iframe>

    </div>

</div>

<!-- Bootstrap JS -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
<script>

window.onload = function()
{
    fetch("StudentNameServlet")
    .then(response => response.text())
    .then(data => {

        document.getElementById("studentName")
        .innerHTML = "Welcome " + data;

    });
}

</script>
</body>
</html>
